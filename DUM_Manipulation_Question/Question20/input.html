<script>
    let h1 = document.querySelector("h1");
    let opacity = 0;
    h1.style.opacity = opacity;

    let intervel = setInterval(() => {
        opacity += 0.1;
         h1.style.opacity = opacity;

         if (opacity >= 1) {
            opacity = 0;
        }
    },200)
</script>
